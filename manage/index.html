<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ceetice Admin Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    :root {
      --blue: #0b5ed7;
      --deep-blue: #062b66;
      --red: #ff3b3b;
      --white: #ffffff;
      --text: #1f1f1f;
      --soft-text: #5f6b7a;
      --bg: #f4f8ff;
      --shadow: 0 10px 30px rgba(11, 94, 215, 0.12);
      --radius: 18px;
    }

    body {
      background: linear-gradient(180deg, #f9fbff 0%, #edf4ff 100%);
      color: var(--text);
      padding: 20px;
    }

    .wrap {
      max-width: 1200px;
      margin: auto;
    }

    .topbar {
      background: linear-gradient(90deg, var(--deep-blue), var(--blue));
      color: white;
      padding: 18px 20px;
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topbar h1 {
      font-size: 1.4rem;
    }

    .btn {
      border: none;
      background: white;
      color: var(--deep-blue);
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 22px;
    }

    .login-box {
      max-width: 450px;
      margin: 40px auto;
    }

    .login-box h2 {
      margin-bottom: 14px;
      color: var(--deep-blue);
    }

    .login-box p {
      color: var(--soft-text);
      margin-bottom: 16px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid #d8e0ef;
      border-radius: 12px;
      font-size: 1rem;
    }

    .submit-btn {
      border: none;
      background: linear-gradient(90deg, var(--deep-blue), var(--blue));
      color: white;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .tab-btn {
      border: none;
      background: #dfe9ff;
      color: var(--deep-blue);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .tab-btn.active {
      background: linear-gradient(90deg, var(--deep-blue), var(--blue));
      color: white;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .toolbar input {
      max-width: 320px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
      background: white;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #ecf0f8;
      vertical-align: top;
      font-size: 0.95rem;
    }

    th {
      background: #f5f8ff;
      color: var(--deep-blue);
    }

    tr:hover {
      background: #fafcff;
    }

    .status {
      margin-top: 10px;
      color: var(--soft-text);
      font-size: 0.95rem;
    }

    .empty {
      color: var(--soft-text);
      padding: 14px 0;
    }

    .count-boxes {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .count-card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .count-card h3 {
      color: var(--deep-blue);
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .count-card p {
      font-size: 2rem;
      font-weight: bold;
      color: var(--red);
    }

    @media (max-width: 700px) {
      .count-boxes {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loginView" class="card login-box">
      <h2>Admin Login</h2>
      <p>Sign in to read site messages and advert leads.</p>
      <form id="loginForm" class="form-grid">
        <input type="email" id="adminEmail" placeholder="Admin Email" required />
        <input type="password" id="adminPassword" placeholder="Password" required />
        <button type="submit" class="submit-btn">Login</button>
      </form>
      <p id="loginStatus" class="status"></p>
    </div>

    <div id="dashboardView" class="hidden">
      <div class="topbar">
        <h1>Ceetice Admin Dashboard</h1>
        <button id="logoutBtn" class="btn">Logout</button>
      </div>

      <div class="count-boxes">
        <div class="count-card">
          <h3>Total Contact Messages</h3>
          <p id="messagesCount">0</p>
        </div>
        <div class="count-card">
          <h3>Total Advert Leads</h3>
          <p id="leadsCount">0</p>
        </div>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="messages">Contact Messages</button>
          <button class="tab-btn" data-tab="leads">Advert Leads</button>
        </div>

        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="Search..." />
          <button id="refreshBtn" class="btn">Refresh</button>
        </div>

        <div id="messagesPanel">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Subject</th>
                  <th>Message</th>
                </tr>
              </thead>
              <tbody id="messagesTableBody"></tbody>
            </table>
          </div>
          <p id="messagesEmpty" class="empty hidden">No messages found.</p>
        </div>

        <div id="leadsPanel" class="hidden">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Name</th>
                  <th>Business Name</th>
                  <th>Phone</th>
                  <th>Address</th>
                  <th>Nature of Business</th>
                  <th>Services Offered</th>
                  <th>Email</th>
                </tr>
              </thead>
              <tbody id="leadsTableBody"></tbody>
            </table>
          </div>
          <p id="leadsEmpty" class="empty hidden">No leads found.</p>
        </div>

        <p id="dashboardStatus" class="status"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://hrcilkmvnumxmafznowp.supabase.co";
    const supabaseKey = "sb_publishable_3bPHYwJ7HwStyR1B98UEHA_VpQj3V66";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const loginView = document.getElementById("loginView");
    const dashboardView = document.getElementById("dashboardView");
    const loginForm = document.getElementById("loginForm");
    const loginStatus = document.getElementById("loginStatus");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const dashboardStatus = document.getElementById("dashboardStatus");
    const searchInput = document.getElementById("searchInput");

    const messagesTableBody = document.getElementById("messagesTableBody");
    const leadsTableBody = document.getElementById("leadsTableBody");
    const messagesEmpty = document.getElementById("messagesEmpty");
    const leadsEmpty = document.getElementById("leadsEmpty");
    const messagesCount = document.getElementById("messagesCount");
    const leadsCount = document.getElementById("leadsCount");

    const messagesPanel = document.getElementById("messagesPanel");
    const leadsPanel = document.getElementById("leadsPanel");
    const tabButtons = document.querySelectorAll(".tab-btn");

    let allMessages = [];
    let allLeads = [];
    let activeTab = "messages";

    function formatDate(value) {
      if (!value) return "";
      return new Date(value).toLocaleString();
    }

    function showLogin() {
      loginView.classList.remove("hidden");
      dashboardView.classList.add("hidden");
    }

    function showDashboard() {
      loginView.classList.add("hidden");
      dashboardView.classList.remove("hidden");
    }

    async function checkSession() {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        showDashboard();
        await loadDashboardData();
      } else {
        showLogin();
      }
    }

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      loginStatus.textContent = "Signing in...";

      const email = document.getElementById("adminEmail").value.trim();
      const password = document.getElementById("adminPassword").value.trim();

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        loginStatus.textContent = error.message;
      } else {
        loginStatus.textContent = "";
        showDashboard();
        await loadDashboardData();
      }
    });

    logoutBtn.addEventListener("click", async function () {
      await supabase.auth.signOut();
      showLogin();
    });

    refreshBtn.addEventListener("click", async function () {
      await loadDashboardData();
    });

    tabButtons.forEach(function (btn) {
      btn.addEventListener("click", function () {
        tabButtons.forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        activeTab = this.dataset.tab;

        if (activeTab === "messages") {
          messagesPanel.classList.remove("hidden");
          leadsPanel.classList.add("hidden");
        } else {
          messagesPanel.classList.add("hidden");
          leadsPanel.classList.remove("hidden");
        }

        applySearch();
      });
    });

    searchInput.addEventListener("input", applySearch);

    function renderMessages(rows) {
      messagesTableBody.innerHTML = "";

      if (!rows.length) {
        messagesEmpty.classList.remove("hidden");
        return;
      }

      messagesEmpty.classList.add("hidden");

      rows.forEach(function (item) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${formatDate(item.created_at)}</td>
          <td>${item.name || ""}</td>
          <td>${item.email || ""}</td>
          <td>${item.subject || ""}</td>
          <td>${item.message || ""}</td>
        `;
        messagesTableBody.appendChild(tr);
      });
    }

    function renderLeads(rows) {
      leadsTableBody.innerHTML = "";

      if (!rows.length) {
        leadsEmpty.classList.remove("hidden");
        return;
      }

      leadsEmpty.classList.add("hidden");

      rows.forEach(function (item) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${formatDate(item.created_at)}</td>
          <td>${item.full_name || ""}</td>
          <td>${item.business_name || ""}</td>
          <td>${item.phone || ""}</td>
          <td>${item.address || ""}</td>
          <td>${item.business_type || ""}</td>
          <td>${item.services_offered || ""}</td>
          <td>${item.email || ""}</td>
        `;
        leadsTableBody.appendChild(tr);
      });
    }

    function applySearch() {
      const q = searchInput.value.trim().toLowerCase();

      if (activeTab === "messages") {
        const filtered = allMessages.filter(function (item) {
          return (
            (item.name || "").toLowerCase().includes(q) ||
            (item.email || "").toLowerCase().includes(q) ||
            (item.subject || "").toLowerCase().includes(q) ||
            (item.message || "").toLowerCase().includes(q)
          );
        });
        renderMessages(filtered);
      } else {
        const filtered = allLeads.filter(function (item) {
          return (
            (item.full_name || "").toLowerCase().includes(q) ||
            (item.business_name || "").toLowerCase().includes(q) ||
            (item.phone || "").toLowerCase().includes(q) ||
            (item.address || "").toLowerCase().includes(q) ||
            (item.business_type || "").toLowerCase().includes(q) ||
            (item.services_offered || "").toLowerCase().includes(q) ||
            (item.email || "").toLowerCase().includes(q)
          );
        });
        renderLeads(filtered);
      }
    }

    async function loadDashboardData() {
      dashboardStatus.textContent = "Loading data...";

      const { data: messages, error: messagesError } = await supabase
        .from("messages")
        .select("*")
        .order("created_at", { ascending: false });

      const { data: leads, error: leadsError } = await supabase
        .from("leads")
        .select("*")
        .order("created_at", { ascending: false });

      if (messagesError || leadsError) {
        dashboardStatus.textContent =
          (messagesError && messagesError.message) ||
          (leadsError && leadsError.message) ||
          "Failed to load data.";
        return;
      }

      allMessages = messages || [];
      allLeads = leads || [];

      messagesCount.textContent = allMessages.length;
      leadsCount.textContent = allLeads.length;

      renderMessages(allMessages);
      renderLeads(allLeads);

      dashboardStatus.textContent = "Dashboard updated.";
      applySearch();
    }

    checkSession();
  </script>
</body>
  </html>
